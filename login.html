<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ARCHIPEDES</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

<div class="page-shell">
  <div class="form-card">
    <div style="text-align: center; margin-bottom: 20px;">
      <a href="index.html" class="brand-mark">ARCHIPEDES</a>
    </div>
    <div class="mini-nav">
      <a href="archive.html">Archive</a>
      <a href="sitemap.html">Sitemap</a>
    </div>
    <h2>Sign In</h2>
    
    <button class="btn btn-secondary" id="google" style="width: 100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
      Continue with Google
    </button>

    <div style="text-align: center; margin-bottom: 20px; color: var(--text-secondary); font-size: 0.8rem;">
      OR
    </div>

    <form id="emailForm">
      <label for="email">Email Address</label>
      <input id="email" type="email" required placeholder="name@example.com">

      <label for="password">Password</label>
      <input id="password" type="password" required placeholder="••••••••">

      <button class="btn btn-primary" type="submit" style="width: 100%;">Login</button>
    </form>
  </div>
</div>

<script type="module">
import { auth } from "./firebase.js";
import {
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

document.getElementById("emailForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "index.html";
  } catch (error) {
    alert("Login failed: " + error.message);
  }
});

document.getElementById("google").onclick = async () => {
  const provider = new GoogleAuthProvider();
  try {
    await signInWithPopup(auth, provider);
    window.location.href = "index.html";
  } catch (error) {
    alert("Google sign-in failed: " + error.message);
  }
};
</script>

</body>
</html>
