<!DOCTYPE html>
<html>
<head>
  <title>Login - ARCHIPEDES</title>
  <link rel="stylesheet" href="https://kuledever.github.io/boxoprompt/style.css">
</head>

<body>

<div class="page-shell">

  <div class="form-card">

    <h2>Sign in to ARCHIPEDES</h2>

    <button class="btn btn-primary" id="google">Sign in with Google</button>

    <form id="emailForm">
      <label>Email</label>
      <input id="email" type="email">

      <label>Password</label>
      <input id="password" type="password">

      <button class="btn btn-primary" type="submit">Login</button>
    </form>

  </div>

</div>

<script type="module">
import { auth } from "./firebase.js";
import {
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

document.getElementById("emailForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  await signInWithEmailAndPassword(
    auth,
    email.value,
    password.value
  );

  window.location.href = "https://kuledever.github.io/archipedes/index.html";
});

document.getElementById("google").onclick = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
  window.location.href = "https://kuledever.github.io/archipedes/index.html";
};
</script>

</body>
</html>
