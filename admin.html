<!DOCTYPE html>
<html>

<head>

<title>ARCHIPEDES Admin</title>

<link rel="stylesheet" href="https://kuledever.github.io/boxoprompt/style.css">

</head>


<body>


<div class="page-shell">


<div class="form-card">


<h2 id="message">
Processing request...
</h2>


<p id="details"></p>


</div>


</div>




<script type="module">


import { auth, db } from "./firebase.js";


import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";



import {

ref,
update

}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";





const message =
document.getElementById("message");


const details =
document.getElementById("details");





onAuthStateChanged(auth, async (user)=>{



if(!user){


window.location.href =
"https://kuledever.github.io/archipedes/login.html";


return;


}





const params =
new URLSearchParams(window.location.search);



const action =
params.get("action");


const id =
params.get("id");





if(!action || !id){


message.textContent =
"Invalid request";


return;


}





let status;



if(action === "approve"){


status = "approved";


}


else if(action === "deny"){


status = "denied";


}


else{


message.textContent =
"Unknown action";


return;


}





await update(

ref(db,"uploads/" + id),

{

status: status,

reviewedBy: user.email,

reviewedAt: new Date().toISOString()

}

);





message.textContent =
"Upload " + status;


details.textContent =
"Upload ID: " + id;



});



</script>



</body>

</html>
