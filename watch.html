<!DOCTYPE html>
<html>

<head>

<title>Watch - ARCHIPEDES</title>

<link rel="stylesheet" href="https://kuledever.github.io/boxoprompt/style.css">


<style>

.player-box {

width:100%;

}


.movie-video {

width:100%;

height:auto;

max-height:80vh;

object-fit:contain;

display:block;

border-radius:12px;

}


</style>


</head>



<body>


<div class="page-shell">


<div class="section-card" id="player">

Loading movie...

</div>


</div>




<script type="module">


import { auth, db } from "./firebase.js";


import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";



import {

ref,

get

}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";





const params =
new URLSearchParams(window.location.search);


const id =
params.get("id");



const player =
document.getElementById("player");






async function loadMovie(){



if(!id){

player.innerHTML =
"Invalid movie ID";

return;

}




const snap =
await get(ref(db,"uploads/"+id));



const movie =
snap.val();





if(!movie || movie.status !== "approved"){


player.innerHTML =
"Movie not found or not approved.";

return;


}





player.innerHTML = `



<h2 class="section-title">

${movie.title}

</h2>



<p class="section-copy">

${movie.year} • ${movie.genre}

</p>





<div class="player-box">


<video 
class="movie-video"
controls
playsinline>


<source

src="${movie.videoUrl}"

type="video/mp4">


Your browser does not support video.


</video>



</div>





<p class="section-copy">

${movie.description}

</p>





<a 

class="btn btn-secondary"

href="${movie.videoUrl}"

download>


Download Movie


</a>



`;



}






onAuthStateChanged(auth,(user)=>{



if(!user){


window.location.href =
"login.html";


return;


}



loadMovie();



});



</script>



</body>

</html>
