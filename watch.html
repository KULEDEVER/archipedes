<!DOCTYPE html>
<html>
<head>
  <title>Watch - ARCHIPEDES</title>
  <link rel="stylesheet" href="https://kuledever.github.io/boxoprompt/style.css">
</head>

<body>

<div class="page-shell">

  <div class="section-card" id="player">
    Loading movie...
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { ref, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const player = document.getElementById("player");

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href =
      "https://kuledever.github.io/archipedes/login.html";
  }
});

async function load() {

  if (!id) {
    player.innerHTML = "Invalid movie ID";
    return;
  }

  const snap = await get(ref(db, "uploads/" + id)); // ✅ FIXED PATH
  const m = snap.val();

  if (!m || m.status !== "approved") {
    player.innerHTML = "Movie not found or not approved.";
    return;
  }

  player.innerHTML = `
    <h2 class="section-title">${m.title}</h2>
    <p class="section-copy">${m.year} • ${m.genre}</p>

    <video controls width="100%">
      <source src="${m.videoUrl}" type="video/mp4">
    </video>
  `;
}

load();
</script>

</body>
</html>
