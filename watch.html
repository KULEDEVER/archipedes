<!DOCTYPE html>
<html>

<head>

<title>Watch - ARCHIPEDES</title>


<link rel="stylesheet"
href="https://kuledever.github.io/boxoprompt/style.css">


<style>


.video-container{

width:100%;

height:calc(100vh - 120px);

display:flex;

justify-content:center;

align-items:center;

}



video{

max-width:100%;

max-height:100%;

width:auto;

height:auto;

border-radius:12px;

}



</style>


</head>



<body>


<div class="page-shell">



<div class="section-card" id="player">


Loading movie...


</div>



</div>





<script type="module">


import { auth, db } from "./firebase.js";


import {

onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";



import {

ref,

get

}

from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";





const params =
new URLSearchParams(window.location.search);


const id =
params.get("id");



const player =
document.getElementById("player");





async function load(){



const snap =
await get(ref(db,"uploads/"+id));



const m =
snap.val();




if(!m || m.status !== "approved"){


player.innerHTML =
"Movie not found.";


return;


}





player.innerHTML = `



<h2 class="section-title">

${m.title}

</h2>



<p class="section-copy">

${m.year} • ${m.genre}

</p>




<div class="video-container">


<video controls>


<source

src="${m.videoUrl}"

type="video/mp4">


</video>


</div>





<p class="section-copy">

${m.description}

</p>





<a class="btn btn-secondary"

href="${m.videoUrl}"

download>

Download Movie

</a>




`;



}







onAuthStateChanged(auth,(user)=>{


if(!user){


window.location.href =
"login.html";


return;


}



load();



});



</script>



</body>

</html>
