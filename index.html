<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCHIPEDES - Public Domain Cinema</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

<div class="page-shell">
  <header class="topbar">
    <a href="index.html" class="brand-mark">ARCHIPEDES</a>
    <nav class="menu">
      <a class="btn btn-secondary" href="archive.html">Archive</a>
      <a class="btn btn-secondary" href="upload.html">Upload</a>
      <a class="btn btn-secondary" href="sitemap.html">Sitemap</a>
      <button class="btn btn-primary" id="logout">Logout</button>
    </nav>
  </header>

  <section class="hero-copy">
    <span class="eyebrow">Public Domain Film Archive</span>
    <h1 class="hero-title">Welcome to ARCHIPEDES</h1>
    <p class="hero-lead">
      Discover the golden age of cinema. Watch, upload, and explore curated public domain films from around the world.
    </p>
    <div class="hero-actions">
      <a href="archive.html" class="btn btn-primary">Browse Archive</a>
    </div>
  </section>
</div>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

document.getElementById("logout").onclick = async () => {
  try {
    await signOut(auth);
    window.location.href = "login.html";
  } catch (error) {
    console.error("Logout error:", error);
  }
};
</script>

</body>
</html>
