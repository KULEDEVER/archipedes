<!DOCTYPE html>
<html>
<head>
  <title>Archive - ARCHIPEDES</title>
  <link rel="stylesheet" href="https://kuledever.github.io/boxoprompt/style.css">
</head>

<body>

<div class="page-shell">

  <header class="topbar">
    <div class="brand-mark">ARCHIPEDES</div>

    <input id="search" placeholder="genre:comedy year:1926">

    <nav class="menu">
      <a class="btn btn-secondary" href="/index.html">Home</a>
    </nav>
  </header>

  <div class="section-grid" id="grid"></div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { ref, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const grid = document.getElementById("grid");

onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "/login.html";
});

async function loadMovies() {
  const snap = await get(ref(db, "movies"));
  const data = snap.val();

  grid.innerHTML = "";

  for (let id in data) {
    const m = data[id];

    grid.innerHTML += `
      <div class="section-card">
        <h2 class="section-title">${m.title}</h2>
        <p class="section-copy">${m.year} • ${m.genre}</p>

        <a class="btn btn-primary" href="/watch.html?id=${id}">
          Watch
        </a>
      </div>
    `;
  }
}

loadMovies();
</script>

</body>
</html>
