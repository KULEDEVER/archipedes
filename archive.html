<!DOCTYPE html>
<html>
<head>
  <title>Archive - ARCHIPEDES</title>
  <link rel="stylesheet" href="https://kuledever.github.io/boxoprompt/style.css">
</head>

<body>

<div class="page-shell">

  <header class="topbar">
    <div class="brand-mark">ARCHIPEDES</div>

    <input id="search" placeholder="genre:comedy year:1926">

    <nav class="menu">
      <a class="btn btn-secondary" href="https://kuledever.github.io/archipedes/index.html">Home</a>
    </nav>
  </header>

  <div class="section-grid" id="grid"></div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { ref, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const grid = document.getElementById("grid");

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href =
      "https://kuledever.github.io/archipedes/login.html";
  }
});

async function loadMovies() {

  const snap = await get(ref(db, "uploads"));
  const data = snap.val();

  grid.innerHTML = "";

  if (!data) {
    grid.innerHTML = `<p>No approved films yet.</p>`;
    return;
  }

  let count = 0;

  for (const id in data) {

    const m = data[id];

    // 🔒 ONLY APPROVED FILMS
    if (!m || m.status !== "approved") continue;

    count++;

    grid.innerHTML += `
      <div class="section-card">
        <h2 class="section-title">${m.title}</h2>
        <p class="section-copy">${m.year} • ${m.genre}</p>

        <a class="btn btn-primary"
           href="https://kuledever.github.io/archipedes/watch.html?id=${id}">
          Watch
        </a>
      </div>
    `;
  }

  if (count === 0) {
    grid.innerHTML = `<p>No approved films yet.</p>`;
  }
}

loadMovies();
</script>

</body>
</html>
